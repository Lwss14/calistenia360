<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Progreso — Calistenia360</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222;--text:#f0f0f0;--text2:#aaa;--text3:#555;--border:rgba(255,255,255,0.08);--green:#1D9E75;--blue:#378ADD;--amber:#EF9F27;--red:#E24B4A;--r:10px;--r2:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:2rem 1.25rem 4rem}
.brand{font-size:10px;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin-bottom:2rem}
.name{font-size:28px;font-weight:500;margin-bottom:.25rem}
.sub{font-size:14px;color:var(--text3);margin-bottom:2rem}
.obj-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between}
.obj-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.obj-val{font-size:18px;font-weight:500}
.obj-val.cal{color:var(--green)}.obj-val.nut{color:var(--blue)}
.sem-dots{display:flex;gap:6px;align-items:center}
.sdot{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:1px solid var(--border)}
.sdot.done{background:var(--green)}.sdot.done.nut{background:var(--blue)}
.nota{background:var(--bg2);border-radius:0 var(--r2) var(--r2) 0;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:14px;font-style:italic;color:var(--text2);line-height:1.7}
.nota.cal{border-left:3px solid var(--green)}.nota.nut{border-left:3px solid var(--blue)}
.nota-by{font-size:11px;color:var(--text3);margin-top:6px;font-style:normal}
.sec{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.75rem}
.mg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.5rem}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem}
.ml{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.mv{font-size:24px;font-weight:500;font-family:'DM Mono',monospace}
.md{font-size:11px;margin-top:3px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text3)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.ct{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.75rem}
.cw{position:relative;width:100%;height:180px;margin-top:.5rem}
.skill-row{padding:.75rem 0;border-bottom:1px solid var(--border)}
.skill-row:last-child{border-bottom:none}
.skill-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.skill-name{font-size:14px;font-weight:500}
.skill-cur{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.skill-vals{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.pb{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pbf{height:100%;border-radius:3px}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:.5rem}
.aw{background:var(--bg3);border-radius:var(--r);padding:.7rem;text-align:center}
.al{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.av{font-size:18px;font-weight:500;font-family:'DM Mono',monospace}
.ab{height:4px;border-radius:2px;margin-top:5px;background:var(--bg2);overflow:hidden}
.abf{height:100%;border-radius:2px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:.5rem}
.fslot{background:var(--bg3);border-radius:var(--r);aspect-ratio:3/4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden}
.fslot img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.fslot-lbl{font-size:11px;color:var(--text3);z-index:1}
.fmonth{font-size:11px;color:var(--text3);margin-bottom:.5rem}
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{text-align:left;padding:5px 6px;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.stbl td{padding:8px 6px;border-bottom:1px solid var(--border)}
.stbl tr:last-child td{border-bottom:none}
.ciclo-tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
.ciclo-up{background:rgba(29,158,117,0.15);color:#1D9E75}
.ciclo-same{background:rgba(239,159,39,0.15);color:#EF9F27}
.ciclo-down{background:rgba(226,75,74,0.15);color:#E24B4A}
.footer{text-align:center;margin-top:3rem;font-size:11px;color:var(--text3);letter-spacing:.1em}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Calistenia 360°</div>
  <div id="content"><div class="empty" style="padding:4rem">Cargando tu progreso...</div></div>
</div>
<script>
const SB='https://xiflekecgnzklicszwmv.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpZmxla2VjZ256a2xpY3N6d212Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDYwODQsImV4cCI6MjA4OTkyMjA4NH0.qyWonslWP1YfvgxgisfNM2VjQsKR_xSE0npZyfXrGHI';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY};
const CID=(new URLSearchParams(window.location.search).get('c')||'joan').toLowerCase();
const get=async(t,q)=>{try{const r=await fetch(SB+'/rest/v1/'+t+'?'+q,{headers:H});return await r.json();}catch(e){return[];}};
const pv=s=>{const m=(s||'').match(/[\d.]+/);return m?parseFloat(m[0]):0};
const ac=t=>t==='nut'?'#378ADD':'#1D9E75';

async function render(){
  const[clients,entries,skills,cfgs,fotos,ciclos]=await Promise.all([
    get('clientes','id=eq.'+CID),
    get('checkins','cliente_id=eq.'+CID+'&order=semana'),
    get('skills','cliente_id=eq.'+CID+'&order=orden'),
    get('config','cliente_id=eq.'+CID),
    get('fotos','cliente_id=eq.'+CID),
    get('ciclos','cliente_id=eq.'+CID+'&order=ciclo')
  ]);
  const c=clients&&clients[0];
  if(!c){document.getElementById('content').innerHTML='<div class="empty" style="padding:4rem">Cliente no encontrado.</div>';return;}
  const cfg=cfgs&&cfgs[0]||{};
  const last=entries.length?entries[entries.length-1]:null,first=entries.length?entries[0]:null;
  const peso=last?parseFloat(last.peso):null,delta=first&&last&&first!==last?(parseFloat(last.peso)-parseFloat(first.peso)):null;
  const avgAdh=entries.length?Math.round(entries.reduce((a,e)=>a+(e.adh||0),0)/entries.length):null;
  const tipo=c.tipo||'cal',color=ac(tipo);
  const semDots=Array.from({length:cfg.semanas||4},(_,i)=>`<div class="sdot ${i<(cfg.semana_actual||0)?'done '+tipo:''}"></div>`).join('');
  const extraMetrics=tipo==='nut'?`
    <div class="mc"><div class="ml">Pasos media</div><div class="mv" style="font-size:18px">${entries.some(e=>e.pasos)?Math.round(entries.filter(e=>e.pasos).reduce((a,e)=>a+e.pasos,0)/entries.filter(e=>e.pasos).length).toLocaleString():'—'}</div><div class="md neu">por día</div></div>
    <div class="mc"><div class="ml">Sueño media</div><div class="mv">${entries.some(e=>e.sueno)?(entries.filter(e=>e.sueno).reduce((a,e)=>a+parseFloat(e.sueno),0)/entries.filter(e=>e.sueno).length).toFixed(1):'—'}</div><div class="md neu">horas</div></div>`:
    `<div class="mc"><div class="ml">Sesiones últ.</div><div class="mv">${last&&last.sesiones!=null?last.sesiones+'/3':'—'}</div><div class="md ${last&&last.sesiones>=3?'pos':last&&last.sesiones>=2?'neu':'neg'}">${last&&last.sesiones!=null?(last.sesiones>=3?'Semana completa':last.sesiones>=2?'Casi':'Mejorar'):'Sin datos'}</div></div>`;
  const skillsHtml=skills.length&&tipo==='cal'?`
    <div class="card"><div class="ct">Mis skills</div>${skills.map(s=>{const cv=pv(s.actual),iv=pv(s.inicio),gv=pv(s.objetivo),pct=gv>iv?Math.min(100,Math.round(((cv-iv)/(gv-iv))*100)):0,col=pct>=80?'#1D9E75':pct>=40?'#EF9F27':'#E24B4A';return`<div class="skill-row"><div class="skill-top"><span class="skill-name">${s.name}</span><span class="skill-cur" style="color:${col}">${s.actual}</span></div><div style="display:flex;align-items:center;gap:8px"><div class="pb" style="flex:1"><div class="pbf" style="width:${pct}%;background:${col}"></div></div><span class="skill-vals">${s.inicio} → ${s.objetivo}</span></div></div>`;}).join('')}</div>
    ${ciclos&&ciclos.length?`<div class="card"><div class="ct">Progresión por ciclos</div><table class="stbl"><thead><tr><th>Skill</th>${[...new Set(ciclos.map(c=>c.ciclo))].sort().map(m=>`<th>${m}</th>`).join('')}</tr></thead><tbody>${skills.map(s=>{const meses=[...new Set(ciclos.map(c=>c.ciclo))].sort();const vals=meses.map(mes=>{const e=ciclos.find(c=>c.skill_id===s.id&&c.ciclo===mes);return e?e.valor:'—';});const cells=vals.map((v,i)=>{if(i===0)return`<td class="mono" style="color:#666">${v}</td>`;const vn=pv(v),vp=pv(vals[i-1]);let cls='ciclo-same',label=v;if(vn>vp){cls='ciclo-up';label='+'+((vn-vp).toFixed(1).replace('.0',''))+' → '+v;}else if(vn<vp){cls='ciclo-down';}return`<td><span class="ciclo-tag ${cls}">${label}</span></td>`;}).join('');return`<tr><td style="font-weight:500">${s.name}</td>${cells}</tr>`;}).join('')}</tbody></table></div>`:''}
  `:'';  const meses=[...new Set((fotos||[]).map(f=>f.mes))];
  const fotosHtml=meses.length?`<div class="card"><div class="ct">Progreso visual</div>${meses.map(mes=>{const ini=fotos.find(f=>f.mes===mes&&f.tipo==='inicio'),fin=fotos.find(f=>f.mes===mes&&f.tipo==='fin');return`<div style="margin-bottom:1rem"><div class="fmonth">${mes}</div><div class="fg"><div class="fslot">${ini?`<img src="${ini.url}" onerror="this.style.display='none'">`:''}<span class="fslot-lbl">Inicio</span></div><div class="fslot">${fin?`<img src="${fin.url}" onerror="this.style.display='none'">`:''}<span class="fslot-lbl">Fin</span></div></div></div>`;}).join('')}</div>`:'';

  document.getElementById('content').innerHTML=`
    <div class="name">${c.name}</div>
    <div class="sub">${tipo==='nut'?'Plan Nutrición':'Plan Calistenia'}</div>
    <div class="obj-block">
      <div><div class="obj-lbl">Objetivo de ${cfg.mes||'este mes'}</div><div class="obj-val ${tipo}">${cfg.objetivo||'—'}</div></div>
      <div><div style="font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em">Semana ${cfg.semana_actual||'?'} de ${cfg.semanas||4}</div><div class="sem-dots">${semDots}</div></div>
    </div>
    ${last&&last.nota?`<div class="nota ${tipo}">"${last.nota}"<div class="nota-by">— Lluís, semana ${last.semana}</div></div>`:''}
    <div class="sec">Mis métricas</div>
    <div class="mg">
      <div class="mc"><div class="ml">Peso actual</div><div class="mv">${peso?peso.toFixed(1):'—'}</div><div class="md ${delta===null?'neu':delta<0?'pos':'neg'}">${delta!==null?(delta<0?'↓ '+Math.abs(delta).toFixed(1)+' kg total':'↑ '+delta.toFixed(1)+' kg total'):'Sin datos aún'}</div></div>
      <div class="mc"><div class="ml">Adherencia</div><div class="mv">${avgAdh!==null?avgAdh+'%':'—'}</div><div class="md ${avgAdh===null?'neu':avgAdh>=80?'pos':avgAdh>=60?'neu':'neg'}">${avgAdh!==null?(avgAdh>=80?'Muy buena':avgAdh>=60?'Mejorable':'Baja'):'Sin datos'}</div></div>
      ${extraMetrics}
    </div>
    <div class="card">
      <div class="ct">Evolución del peso</div>
      <div class="cw" id="cwrap">${!entries.length?'<div class="empty">Aún sin datos</div>':'<canvas id="wc"></canvas>'}</div>
    </div>
    ${entries.length?`<div class="card"><div class="ct">Adherencia semanal</div><div class="ag">${entries.slice(-4).map(e=>{const p=e.adh||0,col=p>=80?'#1D9E75':p>=60?'#EF9F27':'#E24B4A';return`<div class="aw"><div class="al">Sem ${e.semana}</div><div class="av" style="color:${col}">${p}%</div><div class="ab"><div class="abf" style="width:${p}%;background:${col}"></div></div></div>`;}).join('')}</div></div>`:''}
    ${skillsHtml}
    ${fotosHtml}
    <div class="footer">Calistenia 360° · Coaching online 1:1</div>`;

  if(entries.length){
    new Chart(document.getElementById('wc').getContext('2d'),{
      type:'line',data:{labels:entries.map(e=>'S'+e.semana),datasets:[{data:entries.map(e=>parseFloat(e.peso)),borderColor:color,backgroundColor:color+'22',borderWidth:2,pointRadius:5,pointBackgroundColor:color,pointBorderColor:'#0f0f0f',pointBorderWidth:2,tension:0.35,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Sans',size:11}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555',font:{family:'DM Sans',size:11},callback:v=>parseFloat(v).toFixed(1)},min:Math.floor(Math.min(...entries.map(e=>parseFloat(e.peso)))-2),max:Math.ceil(Math.max(...entries.map(e=>parseFloat(e.peso)))+2)}}}
    });
  }
}
render();
</script>
</body>
</html>
